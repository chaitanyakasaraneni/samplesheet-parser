site_name: samplesheet-parser
site_description: Format-agnostic parser for Illumina SampleSheet.csv files — supports IEM V1 and BCLConvert V2
site_url: https://illumina-samplesheet.readthedocs.io
repo_url: https://github.com/chaitanyakasaraneni/samplesheet-parser
repo_name: chaitanyakasaraneni/samplesheet-parser
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - pymdownx.snippets:
      base_path: .
      check_paths: true

nav:
  - Home: index.md
  - Installation: installation.md
  - User Guide:
    - Quickstart: guide/quickstart.md
    - Parsing: guide/parsing.md
    - Validation: guide/validation.md
    - Conversion: guide/conversion.md
    - Diffing: guide/diffing.md
    - Writing & Editing: guide/writing.md
    - Merging: guide/merging.md
    - Splitting: guide/splitting.md
    - Filtering: guide/filtering.md
    - Index Utilities: guide/index_utils.md
  - Examples: examples.md
  - CLI Reference: cli.md
  - API Reference: api.md
  - CI Integration: ci.md
  - Changelog: changelog.md
  - Contributing: contributing.md
